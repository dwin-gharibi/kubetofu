version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: kubetofu-db
    environment:
      POSTGRES_DB: kubetofu
      POSTGRES_USER: kubetofu
      POSTGRES_PASSWORD: ${DB_PASSWORD:-kubetofu_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kubetofu"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: kubetofu-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../../backend
      dockerfile: ../deployment/docker/Dockerfile.backend
    container_name: kubetofu-backend
    environment:
      - DEBUG=false
      - DATABASE_URL=postgresql://kubetofu:${DB_PASSWORD:-kubetofu_secret}@db:5432/kubetofu
      - REDIS_URL=redis://redis:6379
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-change-me-in-production}
      - ALLOWED_HOSTS=localhost,127.0.0.1,backend,kube-tofu.dwin.codes,admin.kube-tofu.dwin.codes,core.kube-tofu.dwin.codes
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://127.0.0.1:3000,https://kube-tofu.dwin.codes,https://admin.kube-tofu.dwin.codes,https://core.kube-tofu.dwin.codes
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ARVAN_API_KEY=${ARVAN_API_KEY:-}
      - ARVAN_REGION=${ARVAN_REGION:-ir-thr-at1}
    volumes:
      - backend_data:/app/data
      - backend_workspaces:/app/workspaces
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/"]
      interval: 10s
      timeout: 5s
      retries: 5

  celery:
    build:
      context: ../../backend
      dockerfile: ../deployment/docker/Dockerfile.backend
    container_name: kubetofu-celery
    command: celery -A kubetofu worker -l info
    environment:
      - DEBUG=false
      - DATABASE_URL=postgresql://kubetofu:${DB_PASSWORD:-kubetofu_secret}@db:5432/kubetofu
      - REDIS_URL=redis://redis:6379
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-change-me-in-production}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ARVAN_API_KEY=${ARVAN_API_KEY:-}
    volumes:
      - backend_workspaces:/app/workspaces
    depends_on:
      - backend
      - redis

  celery-beat:
    build:
      context: ../../backend
      dockerfile: ../deployment/docker/Dockerfile.backend
    container_name: kubetofu-celery-beat
    command: celery -A kubetofu beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      - DEBUG=false
      - DATABASE_URL=postgresql://kubetofu:${DB_PASSWORD:-kubetofu_secret}@db:5432/kubetofu
      - REDIS_URL=redis://redis:6379
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-change-me-in-production}
    depends_on:
      - backend
      - redis

  frontend:
    build:
      context: ../../frontend
      dockerfile: ../deployment/docker/Dockerfile.frontend
    container_name: kubetofu-frontend
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://core.kube-tofu.dwin.codes/api/v1}
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-wss://core.kube-tofu.dwin.codes/ws}
      - NEXT_PUBLIC_ADMIN_URL=${NEXT_PUBLIC_ADMIN_URL:-https://admin.kube-tofu.dwin.codes}
    ports:
      - "3000:3000"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: kubetofu-nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - frontend
    profiles:
      - production

volumes:
  postgres_data:
  redis_data:
  backend_data:
  backend_workspaces:

networks:
  default:
    name: kubetofu-network
