apiVersion: v1
kind: ConfigMap
metadata:
  name: kubetofu-config
  namespace: kubetofu
data:
  DEBUG: "false"
  ALLOWED_HOSTS: "localhost,kubetofu-backend,kube-tofu.dwin.codes,admin.kube-tofu.dwin.codes,core.kube-tofu.dwin.codes"
  CORS_ALLOWED_ORIGINS: "http://localhost:3000,https://kube-tofu.dwin.codes,https://admin.kube-tofu.dwin.codes,https://core.kube-tofu.dwin.codes"
  KUBETOFU_LLM_PROVIDER: "anthropic"
  KUBETOFU_LLM_MODEL: "claude-sonnet-4-20250514"
  ARVAN_REGION: "ir-thr-at1"
  NEXT_PUBLIC_API_URL: "https://core.kube-tofu.dwin.codes/api/v1"
  NEXT_PUBLIC_WS_URL: "wss://core.kube-tofu.dwin.codes/ws"
  NEXT_PUBLIC_ADMIN_URL: "https://admin.kube-tofu.dwin.codes"
---
apiVersion: v1
kind: Secret
metadata:
  name: kubetofu-secrets
  namespace: kubetofu
type: Opaque
stringData:
  DATABASE_URL: "postgresql://kubetofu:password@postgres:5432/kubetofu"
  REDIS_URL: "redis://redis:6379"
  DJANGO_SECRET_KEY: "change-this-in-production-use-strong-random-key"
  ANTHROPIC_API_KEY: ""
  OPENAI_API_KEY: ""
  ARVAN_API_KEY: ""
