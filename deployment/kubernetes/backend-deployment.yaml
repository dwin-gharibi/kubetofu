apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubetofu-backend
  namespace: kubetofu
  labels:
    app: kubetofu-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kubetofu-backend
  template:
    metadata:
      labels:
        app: kubetofu-backend
    spec:
      containers:
        - name: backend
          image: kubetofu/backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: kubetofu-secrets
            - configMapRef:
                name: kubetofu-config
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /api/v1/health/
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/v1/health/
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: workspaces
              mountPath: /app/workspaces
      volumes:
        - name: workspaces
          persistentVolumeClaim:
            claimName: kubetofu-workspaces-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: kubetofu-backend
  namespace: kubetofu
spec:
  selector:
    app: kubetofu-backend
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
